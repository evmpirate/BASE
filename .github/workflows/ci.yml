name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        run: forge fmt --check src test
        working-directory: onchain-trail-badges

      - name: Build
        run: forge build
        working-directory: onchain-trail-badges

      - name: Test
        run: forge test -vv
        working-directory: onchain-trail-badges

  dustsweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dustsweep/package-lock.json

      - name: Install
        run: npm ci
        working-directory: dustsweep

      - name: Lint
        run: npm run lint
        working-directory: dustsweep

      - name: Typecheck
        run: npm run typecheck
        working-directory: dustsweep

      - name: Test
        run: npm test
        working-directory: dustsweep

  dustsweep-fork:
    runs-on: ubuntu-latest
    env:
      FORK_URL: https://mainnet.base.org
      FORK_BLOCK: "48705000"
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dustsweep/package-lock.json

      - name: Install
        run: npm ci
        working-directory: dustsweep

      - name: Start anvil fork of Base mainnet
        run: |
          anvil --fork-url "$FORK_URL" --fork-block-number "$FORK_BLOCK" \
            --chain-id 8453 --port 8545 > anvil.log 2>&1 &
          for i in $(seq 1 40); do
            cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1 && break
            sleep 3
          done
          cast block-number --rpc-url http://127.0.0.1:8545

      - name: Fork integration tests (RUN_FORK)
        run: RUN_FORK=1 npm test
        working-directory: dustsweep

      - name: Install Playwright browser + deps
        run: npx playwright install --with-deps chromium
        working-directory: dustsweep

      - name: E2E (mock wallet vs fork)
        run: npm run e2e
        working-directory: dustsweep
        env:
          CI: "true"

  trailkeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: trailkeeper/package-lock.json

      - name: Install
        run: npm ci
        working-directory: trailkeeper

      - name: Import smoke test
        run: node -e "import('./app.js').then(()=>console.log('IMPORT_OK')).catch(e=>{console.error(e);process.exit(1)})"
        working-directory: trailkeeper

      - name: Test
        run: npm test
        working-directory: trailkeeper
